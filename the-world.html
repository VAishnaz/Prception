<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Prception — The World (Phase 2)</title>
<link rel="preconnect" href="https://unpkg.com" crossorigin />
<link rel="modulepreload" href="https://unpkg.com/three@0.160.0/build/three.module.js" />
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 166 210"><path fill="%231FE6DC" fill-rule="evenodd" d="M 62 61 Q 62 55 66.69 58.75 L 114.19 96.75 Q 122 103 115.44 110.55 L 85.94 144.47 Q 82 149 82 155 L 82 168 Q 82 175 75 175 L 69 175 Q 62 175 62 168 L 62 141 Q 62 135 66.24 130.76 L 89.05 107.95 Q 94 103 88.73 98.39 L 66.52 78.95 Q 62 75 62 69 Z M 74 79 Q 74 75 76.83 77.83 L 98.46 99.46 Q 102 103 98.46 106.54 L 76.83 128.17 Q 74 131 74 127 Z"/></svg>' />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; background: #020808; }

  /* pin demo: mirrors how the section pins inside index.html — the stage
     holds one frozen viewport while ~250vh of scroll scrubs the jelly core's
     arrival (small at top → tumbling + swelling → settled dead center) */
  .track { height: 350vh; position: relative; }
  .stage { position: sticky; top: 0; height: 100vh; overflow: hidden; }
  #world { position: absolute; inset: 0; }

  .hint {
    position: absolute; left: 50%; bottom: 2rem; z-index: 10;
    transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 0.6rem;
    font-family: "Courier New", monospace; font-size: 0.62rem;
    letter-spacing: 0.3em; text-transform: uppercase;
    color: rgba(216, 230, 228, 0.55);
    transition: opacity 0.6s ease; pointer-events: none;
  }
  .hint i {
    display: block; width: 1px; height: 44px;
    background: linear-gradient(to bottom, transparent, #1fe6dc);
    animation: drip 2.2s ease-in-out infinite;
  }
  @keyframes drip { 0% { transform: scaleY(0); transform-origin: top; } 55% { transform: scaleY(1); transform-origin: top; } 56% { transform-origin: bottom; } 100% { transform: scaleY(0); transform-origin: bottom; } }
</style>
</head>
<body>

<div class="track" id="track">
  <div class="stage">
    <div id="world"></div>
    <div class="hint" id="hint"><span>Scroll</span><i></i></div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import { mountWorld } from "./js/world/world.js";

const world = mountWorld(document.getElementById("world"));

// scrub the energy core off scroll position over the pinned track — the same
// progress value index.html's pinned section will feed via world.setScroll()
const track = document.getElementById("track");
const hint = document.getElementById("hint");
const reduced = matchMedia("(prefers-reduced-motion: reduce)").matches;

function onScroll() {
  const range = track.offsetHeight - innerHeight;
  const p = range > 0 ? Math.min(Math.max(scrollY / range, 0), 1) : 1;
  world.setScroll(reduced ? 1 : p);
  hint.style.opacity = p < 0.04 ? 1 : 0;
}
addEventListener("scroll", onScroll, { passive: true });
onScroll();
</script>
</body>
</html>
